            theme: {
                extend: {
                    colors: {
                        theme: {
                            100: 'rgba(var(--theme-100), <alpha-value>)',

                            300: 'rgba(var(--theme-300), <alpha-value>)',
                            400: 'rgba(var(--theme-400), <alpha-value>)',
                            500: 'rgba(var(--theme-500), <alpha-value>)',
                            600: 'rgba(var(--theme-600), <alpha-value>)',
                            800: 'rgba(var(--theme-800), <alpha-value>)',
                            900: 'rgba(var(--theme-900), <alpha-value>)',
                            950: 'rgba(var(--theme-950), <alpha-value>)'
                        }
                    }
                }

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* VARIABLES CSS DES THEMES (MODE NÉON EXTRÊME) */
        :root {
            --theme-rgb: 10, 70, 255;
            --theme-100: 224, 236, 255;
            --theme-200: 193, 216, 255;
            --theme-300: 148, 187, 255;
            --theme-400: 97, 149, 255;
            --theme-500: 38, 109, 255;
            --theme-600: 10, 70, 255;
            --theme-800: 0, 40, 153;
            --theme-900: 0, 25, 102;
            --theme-950: 0, 15, 51;
        }
        body[data-theme="red"] {
            --theme-rgb: 255, 0, 85;
            --theme-100: 255, 228, 230;
            --theme-200: 254, 205, 211;
            --theme-300: 253, 164, 175;
            --theme-400: 251, 113, 133;
            --theme-500: 255, 0, 85;
            --theme-600: 225, 29, 72;
            --theme-800: 159, 18, 57;
            --theme-900: 136, 19, 55;
            --theme-950: 76, 5, 25;
        }
        body[data-theme="green"] {
            --theme-rgb: 57, 255, 20;
            --theme-100: 220, 253, 230;
            --theme-200: 187, 250, 206;
            --theme-300: 134, 239, 172;
            --theme-400: 74, 222, 128;
            --theme-500: 57, 255, 20;
            --theme-600: 22, 163, 74;
            --theme-800: 22, 101, 52;
            --theme-900: 20, 83, 45;
            --theme-950: 5, 46, 22;
        }
        body[data-theme="purple"] {
            --theme-rgb: 213, 0, 255;
            --theme-100: 250, 232, 255;
            --theme-200: 243, 204, 255;
            --theme-300: 233, 168, 255;
            --theme-400: 222, 104, 255;
            --theme-500: 213, 0, 255;
            --theme-600: 162, 28, 175;
            --theme-800: 107, 33, 168;
            --theme-900: 88, 28, 135;
            --theme-950: 59, 7, 100;
        }
        body[data-theme="yellow"] {
            --theme-rgb: 255, 234, 0;
            --theme-100: 254, 252, 216;
            --theme-200: 254, 240, 138;
            --theme-300: 253, 224, 71;
            --theme-400: 250, 204, 21;
            --theme-500: 255, 234, 0;
            --theme-600: 202, 138, 4;
            --theme-800: 133, 77, 14;
            --theme-900: 113, 63, 18;
            --theme-950: 66, 32, 6;
        }

        html, body, #root { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000 !important;
            font-family: 'Inter', sans-serif; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .reader-viewport {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            background-color: #000; z-index: 100; transform-style: preserve-3d; touch-action: none;
        }

        .reader-img {
            width: 100% !important;
            height: 100% !important;
            display: block; object-fit: contain; pointer-events: none;
            transform: translateZ(0); will-change: transform; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            transition: filter 0.4s ease;
        }

        .night-mode-active .reader-img {
            filter: sepia(0.5) brightness(0.6) contrast(0.9) !important;
        }

        /* CORRECTION IOS SAFE AREA POUR LE LECTEUR */
        .reader-ui-top { 
            position: absolute; top: 0; left: 0; right: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); 
            padding: 20px; 
            padding-top: max(20px, env(safe-area-inset-top)); /* Gère l'encoche iOS en mode liseuse */
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            z-index: 120; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .reader-ui-bottom { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
            padding: 25px; 
            padding-bottom: max(25px, env(safe-area-inset-bottom)); /* Gère la barre de retour iOS */
            padding-left: max(25px, env(safe-area-inset-left));
            padding-right: max(25px, env(safe-area-inset-right));
            z-index: 120; display: flex; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .zen-mode-active .reader-ui-top { opacity: 0; pointer-events: none; transform: translateY(-20px); }
        .zen-mode-active .reader-ui-bottom { opacity: 0; pointer-events: none; transform: translateY(20px); }

        .double-layout { 
            display: flex; width: 100vw; height: 100%; gap: 0; 
            align-items: center; justify-content: center; 
            perspective: 3000px; transform-style: preserve-3d; 
        }

        .page-wrapper-left {
            width: 50vw; height: 100%; display: flex; justify-content: flex-end; align-items: center;
            transform-origin: right center; transform-style: preserve-3d;
        }

        .page-wrapper-right {
            width: 50vw; height: 100%; display: flex; justify-content: flex-start; align-items: center;
            transform-origin: left center; transform-style: preserve-3d;
        }

        .img-left { object-position: right center; margin-right: -0.25px; }
        .img-right { object-position: left center; margin-left: -0.25px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes enterRepliRTL { from { transform: perspective(2500px) rotateY(-90deg); transform-origin: left center; filter: brightness(0.7) drop-shadow(-20px 0px 20px rgba(0,0,0,0.5)); } to { transform: perspective(2500px) rotateY(0deg); transform-origin: left center; filter: brightness(1) drop-shadow(0px 0px 0px rgba(0,0,0,0)); } }
        @keyframes enterRepliLTR { from { transform: perspective(2500px) rotateY(90deg); transform-origin: right center; filter: brightness(0.7) drop-shadow(20px 0px 20px rgba(0,0,0,0.5)); } to { transform: perspective(2500px) rotateY(0deg); transform-origin: right center; filter: brightness(1) drop-shadow(0px 0px 0px rgba(0,0,0,0)); } }

        .animate-enter-next-rtl { animation: enterRepliRTL 0.9s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }
        .animate-enter-prev-rtl { animation: enterRepliLTR 0.9s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }
        .animate-enter-next-ltr { animation: enterRepliLTR 0.9s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }
        .animate-enter-prev-ltr { animation: enterRepliRTL 0.9s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }

        @keyframes flipRepliLeft { from { transform: rotateY(90deg); filter: brightness(0.7); } to { transform: rotateY(0deg); filter: brightness(1); } }
        @keyframes flipRepliRight { from { transform: rotateY(-90deg); filter: brightness(0.7); } to { transform: rotateY(0deg); filter: brightness(1); } }
        
        .animate-repli-left { transform-origin: right center; animation: flipRepliLeft 1s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }
        .animate-repli-right { transform-origin: left center; animation: flipRepliRight 1s cubic-bezier(0.15, 0.9, 0.3, 1) forwards; }

        main, .view-container { background-color: #000 !important; height: 100%; }

        .custom-range { -webkit-appearance: none; outline: none; background: #334155; }
        .custom-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: rgb(var(--theme-500)); cursor: pointer; box-shadow: 0 0 10px rgba(var(--theme-rgb), 0.6); }

        @keyframes neon-flicker-opacity {
            0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% { opacity: 0.9; }
            20%, 21.9%, 63%, 63.9%, 65%, 69.9% { opacity: 0.3; }
        }
        
        .neon-flicker {
            animation: neon-flicker-opacity 7s infinite;
            mix-blend-mode: screen; 
            pointer-events: none;
            will-change: opacity;
        }
    </style>
</head>
<body>

    <script type="text/babel">
        window.addEventListener('touchmove', function(e) { if (e.target.closest('.custom-scrollbar') === null) e.preventDefault(); }, {passive: false});
        MobileDragDrop.polyfill({ holdToDrag: 250 });

        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const getSafeStorage = (key, defaultVal) => {
            try { return localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; }
        };
        const setSafeStorage = (key, val) => {
            try { localStorage.setItem(key, val); } catch(e) {}
        };

        const IconPlus = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;

        const IconSettings = (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconSearch = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconChevronLeft = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconUpload = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconClock = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconBookPlus = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path><line x1="12" y1="8" x2="12" y2="14"></line><line x1="9" y1="11" x2="15" y2="11"></line></svg>;
        const IconFloppyUp = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M12 17v-7"></path><polyline points="9 13 12 10 15 13"></polyline></svg>;
        const IconFloppyDown = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M12 10v7"></path><polyline points="9 14 12 17 15 14"></polyline></svg>;
        const IconPalette = (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.5-.7 1.5-1.5 0-.4-.2-.8-.4-1.1-.3-.3-.4-.7-.4-1.1 0-.8.7-1.5 1.5-1.5H16c3.3 0 6-2.7 6-6 0-5.5-4.5-10-10-10z"/></svg>;
        const IconMoon = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const IconSun = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const IconBookmarkOutline = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>;
        const IconBookmarkFilled = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>;

        const DB_NAME = "MangaHub_Stable_V9"; 
        const STORE_NAME = "mangas";

        const initDB = () => new Promise((res) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => {
                if (!e.target.result.objectStoreNames.contains(STORE_NAME)) {
                    e.target.result.createObjectStore(STORE_NAME, {keyPath: "id"});
                }
            };
            req.onsuccess = e => res(e.target.result);
        });

        const bufferToBase64Async = (buffer, type) => new Promise((resolve) => {
            const blob = new Blob([buffer], { type: type || 'application/octet-stream' });
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });

        const base64ToBufferAsync = async (base64, type) => {
            const res = await fetch(`data:${type || 'application/octet-stream'};base64,${base64}`);
            return await res.arrayBuffer();
        };

        const encodeManga = async (manga) => {
            const clone = { ...manga };
            const encodeFile = async (f) => {
                if (!f || !f.data) return f;
                return { ...f, data: await bufferToBase64Async(f.data, f.type) };
            };
            if (clone.coverDouble) clone.coverDouble = await encodeFile(clone.coverDouble);
            if (clone.coverStart) clone.coverStart = await encodeFile(clone.coverStart);
            if (clone.coverEnd) clone.coverEnd = await encodeFile(clone.coverEnd);
            if (clone.cover) clone.cover = await encodeFile(clone.cover);
            if (clone.pages) {
                const pages = [];
                for (let p of clone.pages) pages.push(await encodeFile(p));
                clone.pages = pages;
            }
            return clone;
        };

        const decodeManga = async (manga) => {
            const clone = { ...manga };
            const decodeFile = async (f) => {
                if (!f || typeof f.data !== 'string') return f;
                return { ...f, data: await base64ToBufferAsync(f.data, f.type) };
            };
            if (clone.coverDouble) clone.coverDouble = await decodeFile(clone.coverDouble);
            if (clone.coverStart) clone.coverStart = await decodeFile(clone.coverStart);
            if (clone.coverEnd) clone.coverEnd = await decodeFile(clone.coverEnd);
            if (clone.cover) clone.cover = await decodeFile(clone.cover);
            if (clone.pages) {
                const pages = [];
                for (let p of clone.pages) pages.push(await decodeFile(p));
                clone.pages = pages;
            }
            return clone;
        };

        const createImageUrl = (file) => {
            if (!file) return null;
            if (file instanceof Blob || file instanceof File) return URL.createObjectURL(file);
            else if (file.data) {
                const type = file.type || 'image/jpeg';
                const blob = new Blob([file.data], { type: type });
                return URL.createObjectURL(blob);
            }
            return null;
        };

        const ReaderImage = ({ file, className = "", style = {} }) => {
            const [url, setUrl] = useState(() => createImageUrl(file));
            useEffect(() => { 
                const u = createImageUrl(file); 
                setUrl(u); 
                return () => { if (u) URL.revokeObjectURL(u); };
            }, [file]);
            return url ? <img src={url} className={`reader-img ${className}`} style={style} /> : null;
        };

        const StackThumbnail = ({ file, contain = false, className = "" }) => {
            const [url, setUrl] = useState(null);
            useEffect(() => { 
                const u = createImageUrl(file); 
                setUrl(u); 
                return () => { if (u) URL.revokeObjectURL(u); };
            }, [file]);
            return url ? <img src={url} className={`w-full h-full ${contain ? 'object-contain' : 'object-cover'} ${className}`} /> : null;
        };

        const SpreadDisplay = ({ spread, manga, isAnimating = false, slideDir = "next", physicalStyles = null, isLandscape = true }) => {
            if (!spread) return null;
            
            const isRTL = manga?.direction === 'rtl';
            let animLeftClass = "";
            let animRightClass = "";
            
            if (!physicalStyles && isAnimating) {
                if (isRTL) {
                    if (slideDir === 'next') animRightClass = 'animate-repli-right';
                    if (slideDir === 'prev') animLeftClass = 'animate-repli-left';
                } else {
                    if (slideDir === 'next') animLeftClass = 'animate-repli-left';
                    if (slideDir === 'prev') animRightClass = 'animate-repli-right';
                }
            }

            if (spread.center) {
                if (isLandscape) {
                    return (
                        <div className="flex w-full h-full perspective-[3000px] transform-style-[preserve-3d]">
                            <div className={`w-1/2 h-full relative overflow-hidden ${animLeftClass}`} style={physicalStyles?.left || {}}>
                                <div className="absolute top-0 left-0 w-[100vw] h-full flex justify-center items-center">
                                    <ReaderImage file={spread.center} />
                                </div>
                            </div>
                            <div className={`w-1/2 h-full relative overflow-hidden ${animRightClass}`} style={physicalStyles?.right || {}}>
                                <div className="absolute top-0 right-0 w-[100vw] h-full flex justify-center items-center">
                                    <ReaderImage file={spread.center} />
                                </div>
                            </div>
                        </div>
                    );
                } else {
                    return <ReaderImage file={spread.center} style={physicalStyles?.single || {}} />;
                }
            }
            return (
                <div className="double-layout">
                    <div className={`page-wrapper-left ${animLeftClass}`} style={physicalStyles?.left || {}}>
                        {spread.left ? <ReaderImage file={spread.left} className="img-left" /> : <div className="w-full h-full bg-black"></div>}
                    </div>
                    <div className={`page-wrapper-right ${animRightClass}`} style={physicalStyles?.right || {}}>
                        {spread.right ? <ReaderImage file={spread.right} className="img-right" /> : <div className="w-full h-full bg-black"></div>}
                    </div>
                </div>
            );
        };

        function App() {
            const [isLandscape, setIsLandscape] = useState(window.innerWidth > window.innerHeight);

            const [appTheme, setAppTheme] = useState(() => getSafeStorage('mangaHubTheme', 'blue'));
            const [showThemeSettings, setShowThemeSettings] = useState(false);
            const [isNightMode, setIsNightMode] = useState(() => getSafeStorage('mangaHubNightMode', 'false') === 'true');

            useEffect(() => {
                document.body.setAttribute('data-theme', appTheme);
                setSafeStorage('mangaHubTheme', appTheme);
            }, [appTheme]);

            useEffect(() => {
                setSafeStorage('mangaHubNightMode', isNightMode.toString());
            }, [isNightMode]);

            useEffect(() => {
                const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('orientationchange', handleResize);
                };
            }, []);

            const [view, setView] = useState('hub');
            const [mangas, setMangas] = useState([]);
            const [search, setSearch] = useState("");
            const [libSort, setLibSort] = useState('recent');
            const [currentManga, setCurrentManga] = useState(null);
            
            const [isAdding, setIsAdding] = useState(false);
            const [loading, setLoading] = useState(false);
            const [importProgress, setImportProgress] = useState(null);
            const [cursor, setCursor] = useState(0); 
            const [zenMode, setZenMode] = useState(false);
            const [showNextChapterOverlay, setShowNextChapterOverlay] = useState(false); 
            const [slideDir, setSlideDir] = useState('next'); 
            const [prevCursor, setPrevCursor] = useState(null); 
            
            const [drag, setDrag] = useState({ active: false, startX: 0, diffX: 0, progress: 0, dir: null, targetCursor: null, snapping: false });

            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [purgeConfirm, setPurgeConfirm] = useState(false);
            const [editingManga, setEditingManga] = useState(null);

            const [formTitle, setFormTitle] = useState("");
            const [formMangaDir, setFormMangaDir] = useState('rtl');
            const [formTags, setFormTags] = useState("");
            const [formIsDoubleCover, setFormIsDoubleCover] = useState(false);
            const [activeTags, setActiveTags] = useState([]); 
            const [showTags, setShowTags] = useState(false); 
            const [showBookmarksOnly, setShowBookmarksOnly] = useState(false);
            
            const [coverDoubleFile, setCoverDoubleFile] = useState(null);
            const [coverStartFile, setCoverStartFile] = useState(null);
            const [coverStartPreview, setCoverStartPreview] = useState(null);
            const [coverEndFile, setCoverEndFile] = useState(null);
            const [coverEndPreview, setCoverEndPreview] = useState(null);
            const [orderedPages, setOrderedPages] = useState([]);
            
            const [showSettings, setShowSettings] = useState(false);
            const [showGlobalSettings, setShowGlobalSettings] = useState(false);
            const [isManualSorting, setIsManualSorting] = useState(false);
            const [sortMethod, setSortMethod] = useState('name-asc');
            const [rawPages, setRawPages] = useState([]);

            const [draggedIdx, setDraggedIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);

            useEffect(() => { loadMangas(); }, []);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            const handleExport = async () => {
                setLoading(true); setImportProgress("Préparation de l'export...");
                try {
                    const db = await initDB();
                    const tx = db.transaction(STORE_NAME, "readonly");
                    const allMangas = await new Promise(res => tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result));
                    const encodedMangas = [];
                    for (let i = 0; i < allMangas.length; i++) {
                        setImportProgress(`Compression... (${i+1}/${allMangas.length})`);
                        encodedMangas.push(await encodeManga(allMangas[i]));
                    }
                    const json = JSON.stringify(encodedMangas);
                    const blob = new Blob([json], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `MangaHub_Backup_${new Date().toLocaleDateString('fr-FR').replace(/\//g, '-')}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    setImportProgress(null); setLoading(false); setShowGlobalSettings(false);
                } catch (err) {
                    console.error(err); alert("Erreur lors de l'export."); setLoading(false); setImportProgress(null);
                }
            };

            const handleImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setImportProgress("Lecture du fichier...");
                try {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            const decodedMangas = [];
                            for (let i = 0; i < data.length; i++) {
                                setImportProgress(`Préparation... (${i+1}/${data.length})`);
                                decodedMangas.push(await decodeManga(data[i]));
                            }
                            const db = await initDB();
                            const tx = db.transaction(STORE_NAME, "readwrite");
                            const store = tx.objectStore(STORE_NAME);
                            for (let i = 0; i < decodedMangas.length; i++) { store.put(decodedMangas[i]); }
                            tx.oncomplete = () => { setLoading(false); setImportProgress(null); setShowGlobalSettings(false); e.target.value = ''; loadMangas(); alert("Restauration terminée avec succès !"); };
                        } catch(err) { console.error(err); alert("Fichier invalide ou corrompu."); setLoading(false); setImportProgress(null); e.target.value = ''; }
                    };
                    reader.readAsText(file);
                } catch(err) { console.error(err); setLoading(false); setImportProgress(null); e.target.value = ''; }
            };

            const handleZipImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setCoverStartFile(null); setCoverStartPreview(null);
                setCoverEndFile(null); setCoverEndPreview(null);
                setLoading(true);
                setImportProgress("Lecture de l'archive...");
                try {
                    const zip = new JSZip();
                    await zip.loadAsync(file);
                    let metadata = null;
                    if (zip.file("metadata.json")) { try { metadata = JSON.parse(await zip.file("metadata.json").async("string")); } catch(e) { console.error("Metadata invalide", e); } }
                    const filesMap = {};
                    const imagePromises = [];
                    zip.forEach((relativePath, zipEntry) => {
                        if (!zipEntry.dir && !relativePath.includes('__MACOSX') && !relativePath.endsWith('metadata.json')) {
                            const p = zipEntry.async('arraybuffer').then(buffer => {
                                const ext = relativePath.split('.').pop().toLowerCase();
                                let mimeType = 'image/jpeg';
                                if (ext === 'png') mimeType = 'image/png';
                                else if (ext === 'webp') mimeType = 'image/webp';
                                else if (ext === 'gif') mimeType = 'image/gif';
                                const blob = new Blob([buffer], { type: mimeType });
                                blob.name = relativePath.split('/').pop();
                                blob.lastModified = zipEntry.date ? zipEntry.date.getTime() : Date.now();
                                filesMap[relativePath] = blob;
                                return blob;
                            });
                            imagePromises.push(p);
                        }
                    });
                    await Promise.all(imagePromises);
                    if (metadata) {
                        setImportProgress("Restauration...");
                        setFormTitle(metadata.title || "");
                        setFormMangaDir(metadata.direction || "rtl");
                        setFormIsDoubleCover(metadata.isDoubleCover || false); 
                        
                        const importedTags = new Set((metadata.tags || []).map(t => t.toUpperCase()));
                        if (metadata.group) importedTags.add(metadata.group.toUpperCase());
                        setFormTags(Array.from(importedTags).join(', '));
                        
                        if (metadata.coverStart && filesMap[metadata.coverStart]) { setCoverStartFile(filesMap[metadata.coverStart]); setCoverStartPreview(URL.createObjectURL(filesMap[metadata.coverStart])); }
                        if (metadata.coverEnd && filesMap[metadata.coverEnd]) { setCoverEndFile(filesMap[metadata.coverEnd]); setCoverEndPreview(URL.createObjectURL(filesMap[metadata.coverEnd])); }
                        const pages = (metadata.pages || []).map(p => filesMap[p]).filter(Boolean);
                        setOrderedPages(pages); setRawPages(pages);
                    } else {
                        const images = Object.values(filesMap).filter(f => f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i)).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
                        if (images.length === 0) throw new Error("Archive vide");
                        setFormTitle(file.name.replace(/\.(zip|cbz)$/i, ''));
                        setOrderedPages(images); setRawPages(images);
                        setCoverStartFile(images[0]); setCoverStartPreview(URL.createObjectURL(images[0]));
                    }
                    setLoading(false); setImportProgress(null);
                } catch (error) { console.error("Erreur zip:", error); alert("Erreur lors de l'lecture de l'archive ZIP/CBZ."); setLoading(false); setImportProgress(null); }
                e.target.value = ''; 
            };

            const handleExportArchive = async (manga, format, e) => {
                e.stopPropagation(); setLoading(true); setImportProgress(`Préparation ${format.toUpperCase()}...`);
                try {
                    const zip = new JSZip();
                    const metadata = { title: manga.title || "", direction: manga.direction || "rtl", isDoubleCover: manga.isDoubleCover || false, tags: manga.tags || [], pages: [] };
                    
                    const addFileToZip = (fileObj, nameBase) => {
                        const buffer = fileObj?.data || fileObj; if (!buffer) return null;
                        const ext = fileObj?.type === 'image/png' ? 'png' : fileObj?.type === 'image/webp' ? 'webp' : 'jpg';
                        const filename = `${nameBase}.${ext}`; zip.file(filename, buffer); return filename;
                    };
                    
                    if (manga.coverDouble) metadata.coverDouble = addFileToZip(manga.coverDouble, "cover_double");
                    if (manga.coverStart) metadata.coverStart = addFileToZip(manga.coverStart, "cover_start");
                    if (manga.coverEnd) metadata.coverEnd = addFileToZip(manga.coverEnd, "cover_end");
                    const fallbackCover = manga.coverDouble || manga.coverStart || manga.cover; if (fallbackCover) addFileToZip(fallbackCover, "000_cover_preview"); 
                    if (manga.pages) { manga.pages.forEach((p, i) => { const filename = addFileToZip(p, `page_${String(i+1).padStart(3,'0')}`); if (filename) metadata.pages.push(filename); }); }
                    zip.file("metadata.json", JSON.stringify(metadata, null, 2));
                    const content = await zip.generateAsync({ type: "blob" });
                    const a = document.createElement("a"); a.href = URL.createObjectURL(content); a.download = `${manga.title.replace(/[^a-z0-9]/gi,'_')}.${format}`; a.click();
                    setLoading(false); setImportProgress(null);
                } catch (error) { console.error(error); alert(`Erreur lors de l'export.`); setLoading(false); setImportProgress(null); }
            };

            const loadMangas = async () => {
                const db = await initDB();
                db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll().onsuccess = e => setMangas(e.target.result || []);
            };

            const saveProgress = async (mangaId, newCursor, isFinished = false, currentTotalSpreads = 0) => {
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.get(mangaId).onsuccess = (e) => {
                    const manga = e.target.result;
                    if (manga) { 
                        manga.progress = newCursor; manga.isFinished = isFinished;
                        if (currentTotalSpreads > 0) manga.totalSpreads = currentTotalSpreads;
                        
                        if (isFinished) manga.bookmark = null; 
                        
                        manga.lastRead = Date.now(); store.put(manga); 
                        
                        if (isFinished && currentManga && currentManga.id === mangaId && currentManga.bookmark != null) {
                            setCurrentManga(prev => ({...prev, bookmark: null}));
                            loadMangas();
                        }
                    }
                };
            };

            useEffect(() => {
                if (view === 'reader' && currentManga && allSpreads) {
                    const timer = setTimeout(() => {
                        saveProgress(currentManga.id, cursor, cursor >= (allSpreads.length || 1) - 1, allSpreads.length);
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [cursor, currentManga, view, allSpreads]);

            const markAsRead = async (manga) => {
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.get(manga.id).onsuccess = (e) => {
                    const dbManga = e.target.result;
                    if (dbManga) { dbManga.lastRead = Date.now(); store.put(dbManga); loadMangas(); }
                };
            };
            
            const handlePagesSelection = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    setRawPages(Array.from(e.target.files)); setSortMethod('name-asc'); setIsManualSorting(false);
                }
            };

            useEffect(() => {
                if (!rawPages.length || sortMethod === 'custom') return;
                let files = [...rawPages];
                if (sortMethod === 'name-asc') files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
                else if (sortMethod === 'date-asc') files.sort((a, b) => a.lastModified - b.lastModified);
                else if (sortMethod === 'date-desc') files.sort((a, b) => b.lastModified - a.lastModified);
                setOrderedPages(files);
            }, [rawPages, sortMethod]);

            const handleDragStart = (e, index) => {
                setDraggedIdx(index);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', index);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (dragOverIdx !== index) {
                    setDragOverIdx(index);
                }
            };

            const handleDrop = (e, index) => {
                e.preventDefault();
                e.stopPropagation();
                if (draggedIdx !== null && draggedIdx !== index) {
                    const newPages = [...orderedPages];
                    const item = newPages.splice(draggedIdx, 1)[0];
                    newPages.splice(index, 0, item);
                    setOrderedPages(newPages);
                    setSortMethod('custom');
                }
                setDraggedIdx(null);
                setDragOverIdx(null);
            };

            const handleDragEnd = () => {
                setDraggedIdx(null);
                setDragOverIdx(null);
            };

            const toggleBookmark = async (e) => {
                if (e) e.stopPropagation();
                if (!currentManga) return;
                
                const newBookmark = currentManga.bookmark === cursor ? null : cursor;
                setCurrentManga(prev => ({...prev, bookmark: newBookmark})); 
                
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.get(currentManga.id).onsuccess = (ev) => {
                    const manga = ev.target.result;
                    if (manga) {
                        manga.bookmark = newBookmark;
                        store.put(manga);
                    }
                };
                tx.oncomplete = () => loadMangas();
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!orderedPages.length || !coverStartFile) { alert("Il manque au minimum la cover de début et les pages !"); return; }
                setLoading(true); setImportProgress("0%");
                try {
                    const fileToBuffer = (file) => new Promise((resolve, reject) => {
                        if(!file) return resolve(null);
                        const reader = new FileReader();
                        reader.onload = () => resolve({ name: file.name, type: file.type || 'image/jpeg', data: reader.result });
                        reader.readAsArrayBuffer(file);
                    });
                    const coverDoubleBuffer = await fileToBuffer(coverDoubleFile); 
                    const coverStartBuffer = await fileToBuffer(coverStartFile);
                    const coverEndBuffer = await fileToBuffer(coverEndFile);
                    const pagesBuffers = [];
                    for (let i = 0; i < orderedPages.length; i++) {
                        pagesBuffers.push(await fileToBuffer(orderedPages[i]));
                        setImportProgress(`${Math.round(((i + 1) / orderedPages.length) * 100)}%`);
                    }
                    
                    const newTags = formTags.split(',').map(t => t.trim().toUpperCase()).filter(Boolean);

                    const db = await initDB();
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    tx.objectStore(STORE_NAME).add({
                        id: "m_"+Date.now(), title: formTitle || "Sans titre", direction: formMangaDir,
                        tags: newTags,
                        isDoubleCover: formIsDoubleCover, 
                        coverDouble: coverDoubleBuffer, 
                        coverStart: coverStartBuffer, 
                        coverEnd: coverEndBuffer, 
                        cover: coverStartBuffer || coverDoubleBuffer,
                        pages: pagesBuffers, progress: 0, date: Date.now()
                    });
                    tx.oncomplete = () => { setLoading(false); setImportProgress(null); setIsAdding(false); resetForm(); loadMangas(); };
                } catch (error) { console.error(error); setLoading(false); setImportProgress(null); alert("Erreur import."); }
            };

            const resetForm = () => {
                if (coverStartPreview) URL.revokeObjectURL(coverStartPreview);
                if (coverEndPreview) URL.revokeObjectURL(coverEndPreview);
                setFormTitle(""); setFormTags(""); setFormIsDoubleCover(false); setCoverDoubleFile(null); setCoverStartFile(null); setCoverEndFile(null);
                setCoverStartPreview(null); setCoverEndPreview(null);
                setOrderedPages([]); setRawPages([]); setShowSettings(false); setIsManualSorting(false);
            };

            const executeUpdateManga = async (e) => {
                e.preventDefault(); const nt = e.target.title.value;
                const nTags = e.target.tags.value.split(',').map(t => t.trim().toUpperCase()).filter(Boolean);
                setLoading(true); const db = await initDB(); const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME); store.get(editingManga.id).onsuccess = (ev) => {
                    const item = ev.target.result; if (item) { item.title = nt; item.tags = nTags; delete item.group; store.put(item); }
                };
                tx.oncomplete = () => { setLoading(false); setEditingManga(null); loadMangas(); };
            };

            const executePurge = async () => { setLoading(true); const db = await initDB(); db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).clear(); window.location.reload(); };

            const getProgressPercent = (m) => {
                if (!m) return 0; if (m.isFinished) return 100;
                if (m.totalSpreads && m.totalSpreads > 1) return Math.min(100, Math.round((m.progress / (m.totalSpreads - 1)) * 100));
                return Math.min(100, Math.round((m.progress / Math.max(1, m.pages?.length || 1)) * 100));
            };

            const libraryStructure = useMemo(() => {
                const tagsSet = new Set();
                
                const normalizedMangas = mangas.map(m => {
                    const tSet = new Set((m.tags || []).map(t => t.toUpperCase()));
                    if (m.group) tSet.add(m.group.toUpperCase());
                    return { ...m, tags: Array.from(tSet).sort() };
                });

                normalizedMangas.forEach(m => m.tags.forEach(t => tagsSet.add(t)));
                const allAvailableTags = Array.from(tagsSet).sort();

                const filtered = normalizedMangas.filter(m => {
                    const matchSearch = m.title.toLowerCase().includes(search.toLowerCase());
                    const matchTags = activeTags.length === 0 || activeTags.every(t => m.tags.includes(t));
                    const matchBookmark = showBookmarksOnly ? (m.bookmark != null) : true;
                    return matchSearch && matchTags && matchBookmark;
                });

                if (libSort === 'alpha') {
                    filtered.sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric: true}));
                } else {
                    filtered.sort((a,b) => b.date - a.date);
                }

                return { mangas: filtered, allAvailableTags };
            }, [mangas, search, libSort, activeTags, showBookmarksOnly]);

            const allSpreads = useMemo(() => {
                if(!currentManga) return [];
                
                let p = currentManga.pages || [];
                const startName = currentManga.coverStart?.name;
                const endName = currentManga.coverEnd?.name;
                if (startName || endName) {
                    p = p.filter(page => page.name !== startName && page.name !== endName);
                }

                const spreads = []; 
                const isRTL = currentManga.direction === 'rtl';
                const isDouble = currentManga.isDoubleCover;
                
                if (isLandscape) {
                    if (isDouble && currentManga.coverStart && currentManga.coverEnd) {
                        if (isRTL) {
                            spreads.push({ left: currentManga.coverStart, right: currentManga.coverEnd, info: "Couvertures", pageIndices: [-1] });
                        } else {
                            spreads.push({ left: currentManga.coverEnd, right: currentManga.coverStart, info: "Couvertures", pageIndices: [-1] });
                        }
                    } else {
                        const cover = currentManga.coverStart || currentManga.coverDouble;
                        if (cover) {
                            if (isRTL) {
                                spreads.push({ left: cover, right: null, info: "Couverture", pageIndices: [-1] });
                            } else {
                                spreads.push({ left: null, right: cover, info: "Couverture", pageIndices: [-1] });
                            }
                        }
                    }

                    for (let i = 0; i < p.length; i += 2) {
                        const next = p[i+1];
                        if (!next) {
                            if (isRTL) spreads.push({ left: null, right: p[i], info: `Page ${i+1}`, pageIndices: [i] });
                            else spreads.push({ left: p[i], right: null, info: `Page ${i+1}`, pageIndices: [i] });
                        }
                        else if (isRTL) spreads.push({ left: p[i+1], right: p[i], info: `Pages ${i+2} - ${i+1}`, pageIndices: [i, i+1] });
                        else spreads.push({ left: p[i], right: p[i+1], info: `Pages ${i+1} - ${i+2}`, pageIndices: [i, i+1] });
                    }
                    
                    if (currentManga.coverEnd && !isDouble) {
                        if (isRTL) {
                            spreads.push({ left: null, right: currentManga.coverEnd, info: "Couverture Fin", pageIndices: [-2] });
                        } else {
                            spreads.push({ left: currentManga.coverEnd, right: null, info: "Couverture Fin", pageIndices: [-2] });
                        }
                    }
                } else {
                    const startCover = currentManga.coverStart || currentManga.coverDouble;
                    if (startCover) spreads.push({ center: startCover, info: "Couverture Début", pageIndices: [-1] });
                    
                    p.forEach((page, i) => spreads.push({ center: page, info: `Page ${i+1}`, pageIndices: [i] }));
                    
                    if (currentManga.coverEnd) spreads.push({ center: currentManga.coverEnd, info: "Couverture Fin", pageIndices: [-2] });
                }
                return spreads;
            }, [currentManga, isLandscape]);

            const prevOrientation = useRef(isLandscape);
            const prevSpreadsRef = useRef(allSpreads);

            useEffect(() => {
                if (prevOrientation.current !== isLandscape && allSpreads && allSpreads.length > 0) {
                    const oldSpreads = prevSpreadsRef.current; const currentSpread = oldSpreads[cursor];
                    if (currentSpread && currentSpread.pageIndices) {
                        const isRTL = currentManga?.direction === 'rtl'; let targetPage = currentSpread.pageIndices[0];
                        if (prevOrientation.current === true && isLandscape === false && currentSpread.pageIndices.length === 2) { targetPage = isRTL ? currentSpread.pageIndices[0] : currentSpread.pageIndices[1]; }
                        const newCursor = allSpreads.findIndex(s => s.pageIndices.includes(targetPage));
                        if (newCursor !== -1 && newCursor !== cursor) { setCursor(newCursor); }
                    }
                    prevOrientation.current = isLandscape;
                }
                prevSpreadsRef.current = allSpreads;
            }, [isLandscape, allSpreads, currentManga, cursor]);

            const handleSetCursor = (newVal) => {
                if (newVal === cursor) return;
                setPrevCursor(cursor);
                setSlideDir(newVal > cursor ? 'next' : 'prev');
                setCursor(newVal);
                setShowNextChapterOverlay(false);
                setTimeout(() => setPrevCursor(null), 1200);
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (view !== 'reader' || isAdding || showGlobalSettings || !allSpreads) return;
                    const isRTL = currentManga?.direction === 'rtl';
                    
                    if (e.key === 'ArrowRight') {
                        const goNext = isRTL ? false : true;
                        if (goNext) {
                            if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1);
                            else setShowNextChapterOverlay(true);
                        } else {
                            if (showNextChapterOverlay) setShowNextChapterOverlay(false);
                            else if (cursor > 0) handleSetCursor(cursor - 1);
                        }
                    } else if (e.key === 'ArrowLeft') {
                        const goNext = isRTL ? true : false;
                        if (goNext) {
                            if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1);
                            else setShowNextChapterOverlay(true);
                        } else {
                            if (showNextChapterOverlay) setShowNextChapterOverlay(false);
                            else if (cursor > 0) handleSetCursor(cursor - 1);
                        }
                    } else if (e.key === 'ArrowUp') {
                        setZenMode(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [view, cursor, allSpreads, showNextChapterOverlay, isAdding, showGlobalSettings, currentManga]);

            const isPhysicalAnimating = drag.active || drag.snapping;
            
            let physicalStyles = null;
            if (isPhysicalAnimating) {
                const isRTL = currentManga?.direction === 'rtl';
                const p = drag.progress; 
                const trans = drag.snapping ? 'transform 0.4s cubic-bezier(0.15, 0.9, 0.3, 1), filter 0.4s' : 'none';

                const brightness = 1 - (Math.sin(p * Math.PI) * 0.35); 
                const dropShadowX = drag.dir === 'next' ? -35 : 35;
                const shadowOpacity = Math.sin(p * Math.PI) * 0.7; 
                const filterStyle = `brightness(${brightness}) drop-shadow(${dropShadowX}px 5px 30px rgba(0, 0, 0, ${shadowOpacity}))`;

                let singleAngle = 0; let singleOrigin = 'center';
                let leftStyle = {}; let rightStyle = {};

                if (isRTL) {
                    if (drag.dir === 'next') { 
                        singleAngle = -90 + (p * 90); singleOrigin = 'left center'; 
                        rightStyle = { transform: `perspective(2500px) rotateY(${-90 + (p * 90)}deg)`, transformOrigin: 'left center', transition: trans, filter: filterStyle };
                    }
                    if (drag.dir === 'prev') { 
                        singleAngle = 90 - (p * 90); singleOrigin = 'right center'; 
                        leftStyle = { transform: `perspective(2500px) rotateY(${90 - (p * 90)}deg)`, transformOrigin: 'right center', transition: trans, filter: filterStyle };
                    }
                } else {
                    if (drag.dir === 'next') { 
                        singleAngle = 90 - (p * 90); singleOrigin = 'right center'; 
                        leftStyle = { transform: `perspective(2500px) rotateY(${90 - (p * 90)}deg)`, transformOrigin: 'right center', transition: trans, filter: filterStyle };
                    }
                    if (drag.dir === 'prev') { 
                        singleAngle = -90 + (p * 90); singleOrigin = 'left center'; 
                        rightStyle = { transform: `perspective(2500px) rotateY(${-90 + (p * 90)}deg)`, transformOrigin: 'left center', transition: trans, filter: filterStyle };
                    }
                }

                physicalStyles = {
                    single: { transform: `perspective(2500px) rotateY(${singleAngle}deg)`, transformOrigin: singleOrigin, transition: trans, filter: filterStyle },
                    left: leftStyle,
                    right: rightStyle
                };
            }

            const handlePointerDown = (e) => {
                if (showNextChapterOverlay || prevCursor !== null) return;
                if (e.target.tagName?.toLowerCase() === 'input' || e.target.closest('button')) return;
                
                e.target.setPointerCapture(e.pointerId);
                setDrag({ active: true, startX: e.clientX, diffX: 0, progress: 0, dir: null, targetCursor: null, snapping: false });
            };

            const handlePointerMove = (e) => {
                if (!drag.active || !allSpreads) return;
                const diffX = e.clientX - drag.startX;
                const isRTL = currentManga?.direction === 'rtl';

                let dir = null;
                if (diffX > 5) dir = isRTL ? 'next' : 'prev';
                else if (diffX < -5) dir = isRTL ? 'prev' : 'next';

                let targetCursor = null;
                if (dir === 'next') targetCursor = cursor + 1;
                if (dir === 'prev') targetCursor = cursor - 1;

                let progress = 0;
                if (targetCursor !== null && targetCursor >= 0 && targetCursor < allSpreads.length) {
                    progress = Math.min(1, Math.abs(diffX) / window.innerWidth);
                } else {
                    progress = Math.min(0.15, Math.abs(diffX) / (window.innerWidth * 3));

            };

                if (!drag.active || !allSpreads) return;

                            else setShowNextChapterOverlay(true);

                            if (showNextChapterOverlay) setShowNextChapterOverlay(false);

                    }, 400);
                } else {
                    if (drag.targetCursor !== null && drag.targetCursor >= allSpreads.length && drag.progress > 0.1) {

                    }
                    setDrag(prev => ({ ...prev, active: false, snapping: 'backward', progress: 0 }));

                                                    if (e.target.files && e.target.files[0]) {
                                                        setCoverEndFile(e.target.files[0]);
                                                        if (coverEndPreview) URL.revokeObjectURL(coverEndPreview);
                                                        setCoverEndPreview(URL.createObjectURL(e.target.files[0]));
                                                    } 
                                                }} />
                                            </label>
                                        )}
                                    </div>

                                    <div className={`relative rounded-2xl border text-center transition-all h-24 mb-2 group ${orderedPages.length > 0 ? 'bg-theme-950/30 border-theme-500 shadow-[0_0_15px_rgba(var(--theme-rgb),0.3)]' : 'bg-black hover:bg-theme-950/30 border-theme-600/40 shadow-[inset_0_0_15px_rgba(var(--theme-rgb),0.1)] hover:shadow-[0_0_15px_rgba(var(--theme-rgb),0.3)] hover:border-theme-400'}`}>
                                        <label className="absolute inset-0 cursor-pointer flex flex-col items-center justify-center z-10 active:scale-95">
                                            <span className={`text-[10px] uppercase font-black mb-1 transition-colors ${orderedPages.length > 0 ? 'text-theme-300' : 'text-theme-200 group-hover:text-theme-100'}`}>Pages Intérieures</span>
                                            <span className="text-theme-700 text-[8px] font-bold uppercase mb-2">Multiples</span>
                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handlePagesSelection} />
                                            {orderedPages.length > 0 ? (
                                                <span className="text-theme-100 font-black text-[9px] bg-theme-600/40 border border-theme-400 px-2 py-1 rounded-md shadow-[0_0_10px_rgba(var(--theme-rgb),0.5)]">✓ {orderedPages.length} PAGES</span>
                                            ) : (
                                                <span className="text-theme-400 font-black text-[9px] bg-theme-900/40 border border-theme-500/30 px-2 py-1 rounded-md group-hover:bg-theme-600/30 group-hover:border-theme-400 transition-all">+ SÉLECTIONNER LES PAGES</span>
                                            )}
                                        </label>
                                        
                                        {orderedPages.length > 0 && (
                                            <button 
                                                type="button" 
                                                onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsManualSorting(true); }}
                                                className="absolute top-2 right-2 p-1.5 bg-theme-600/40 text-theme-100 hover:text-white rounded-lg border border-theme-400 hover:bg-theme-500 transition-all z-20 shadow-[0_0_10px_rgba(var(--theme-rgb),0.6)] active:scale-95"
                                                title="Modifier l'ordre"
                                            >
                                                <IconSettings />
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="flex gap-3 mt-2 pt-4 border-t border-theme-600/30 flex-none relative z-10">
                                    <button type="button" onClick={() => setIsAdding(false)} className="flex-1 py-4 text-theme-500 hover:text-theme-300 hover:bg-theme-950/30 font-black uppercase text-[10px] rounded-xl transition-all border border-transparent hover:border-theme-600/40">Annuler</button>
                                    <button 
                                        type="submit" 
                                        disabled={!coverStartFile || orderedPages.length === 0} 
                                        className={`flex-1 py-4 rounded-xl font-black uppercase text-[10px] transition-all shadow-lg border ${(!coverStartFile || orderedPages.length === 0) ? 'bg-black text-theme-800 border-theme-900/30 shadow-none cursor-not-allowed' : 'bg-theme-600/20 text-theme-300 border-theme-500 hover:bg-theme-600/30 shadow-[0_0_15px_rgba(var(--theme-rgb),0.4)] hover:shadow-[0_0_25px_rgba(var(--theme-rgb),0.6)] active:scale-95'}`}
                                    >
                                        Lancer l'import
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {isManualSorting && (
                        <div className="fixed inset-0 z-[400] bg-black/95 p-4 sm:p-8 animate-in flex flex-col backdrop-blur-md">
                            <div className="flex justify-between items-center mb-6 border-b border-theme-600/30 pb-4 flex-none">
                                <div>
                                    <h3 className="text-sm sm:text-lg font-black uppercase text-theme-400 tracking-widest" style={{ textShadow: '0 0 10px rgba(var(--theme-rgb),0.8)' }}>Ordre manuel</h3>
                                    <p className="text-[10px] text-theme-300/50 uppercase mt-1">Maintenez appuyé pour glisser-déposer</p>
                                </div>
                                <button type="button" onClick={() => setIsManualSorting(false)} className="bg-theme-600/20 text-theme-300 border border-theme-500 px-4 py-2 sm:px-6 sm:py-3 rounded-xl text-[10px] sm:text-xs font-black uppercase transition-all shadow-[0_0_15px_rgba(var(--theme-rgb),0.3)] hover:shadow-[0_0_25px_rgba(var(--theme-rgb),0.6)] hover:bg-theme-600/30">TERMINER</button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-20">
                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3 sm:gap-4">
                                    {orderedPages.map((f, i) => (
                                        <div 
                                            key={f.name + i}
                                            draggable
                                            onDragStart={(e) => handleDragStart(e, i)}
                                            onDragOver={(e) => handleDragOver(e, i)}
                                            onDrop={(e) => handleDrop(e, i)}
                                            onDragEnd={handleDragEnd}
                                            className={`relative aspect-[3/4.5] bg-black rounded-xl overflow-hidden border transition-all cursor-move group select-none
                                                ${draggedIdx === i ? 'opacity-40 border-theme-400 scale-95 shadow-[0_0_20px_rgba(var(--theme-rgb),0.6)]' : 'border-theme-600/40 shadow-[0_0_10px_rgba(var(--theme-rgb),0.15)] hover:shadow-[0_0_20px_rgba(var(--theme-rgb),0.4)] hover:border-theme-400'}
                                                ${dragOverIdx === i && draggedIdx !== i ? 'border-dashed border-2 border-theme-400 scale-105 shadow-[0_0_25px_rgba(var(--theme-rgb),0.6)] z-10' : ''}
                                            `}
                                        >
                                            <StackThumbnail file={f} />
                                            
                                            <div className="absolute top-1 left-1 bg-black/80 backdrop-blur-md text-theme-400 font-black text-[10px] min-w-[20px] h-[20px] flex items-center justify-center rounded border border-theme-500/50 shadow-[0_0_10px_rgba(var(--theme-rgb),0.4)]">
                                                {i + 1}
                                            </div>
                                            
                                            <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black via-black/90 to-transparent p-2 pt-6 pointer-events-none">
                                                <p className="text-[8px] text-theme-100 font-bold truncate text-center drop-shadow-[0_0_5px_rgba(0,0,0,1)] opacity-70 group-hover:opacity-100">{f.name}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="fixed inset-0 z-[600] flex flex-col items-center justify-center bg-black/95 backdrop-blur-md">
                            <div className="relative">
                                <div className="absolute inset-0 bg-theme-500/30 blur-[20px] rounded-full"></div>
                                <div className="w-14 h-14 border-4 border-theme-500 border-t-transparent rounded-full animate-spin drop-shadow-[0_0_10px_rgba(var(--theme-rgb),0.8)] relative z-10"></div>
                            </div>
                            <p className="mt-6 text-[10px] font-black text-theme-300 uppercase tracking-widest" style={{ textShadow: '0 0 10px rgba(var(--theme-rgb),0.6)' }}>
                                {importProgress ? `Traitement... ${importProgress}` : 'Optimisation...'}
                            </p>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // INITIALISATION DU SERVICE WORKER (Indispensable pour le mode hors ligne)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol !== 'blob:') {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('Service Worker enregistré ! (Mode hors-ligne activé)', reg))
                        .catch(err => console.error('Erreur Service Worker', err));
                }
            });
        }
    </script>
</body>
</html>
